<div class="card" [class.card--elevated]="elevated()">
  @if (title()) {
    <div class="card__header">
      <h3 class="card__title">{{ title() }}</h3>
      @if (subtitle()) {
        <p class="card__subtitle">{{ subtitle() }}</p>
      }
    </div>
  }
  <div class="card__body">
    <ng-content />
  </div>
  <ng-content select="[card-footer]" />
</div>
