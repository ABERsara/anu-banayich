<section class="home">
  <h1 class="home__title">Welcome to Practicum</h1>
  <p class="home__subtitle">Your project foundation is ready. Start building.</p>

  <div class="home__cards">
    <app-card title="Frontend" subtitle="Angular 22 + SCSS" [elevated]="true">
      Standalone components, lazy-loaded routes, shared UI library.
      <div card-footer class="card-actions">
        <app-button variant="primary">Get Started</app-button>
      </div>
    </app-card>

    <app-card title="Backend" subtitle="FastAPI + Python" [elevated]="true">
      RESTful API with Pydantic v2, SQLAlchemy, JWT auth skeleton.
      <div card-footer class="card-actions">
        <app-button variant="secondary">View Docs</app-button>
      </div>
    </app-card>
  </div>
</section>
